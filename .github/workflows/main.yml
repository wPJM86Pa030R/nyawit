name: Pyrogram x Tele User_Bot x Rclone

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 300
    env:
      API_ID: ${{ secrets.API_ID }}
      API_HASH: ${{ secrets.API_HASH }}
      SESSION_STRING: ${{ secrets.SESSION_STRING }}
      DOWNLOAD_DIR: ${{ secrets.DOWNLOAD_DIR }}
      PROGRESS_INTERVAL: ${{ secrets.PROGRESS_INTERVAL }}
      RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
      RCLONE_REMOTE_PATH: ${{ secrets.RCLONE_REMOTE_PATH }}
      FILEDROP: ${{ secrets.FILEDROP_KEY }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
      PUBLIC_MODE: "1"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download ngrok
      run: |
        wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xvzf ngrok-v3-stable-linux-amd64.tgz
        chmod +x ngrok

    - name: Auth ngrok
      run: ./ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Setup SSH & Install Bclone
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server jq curl unzip ffmpeg aria2
        sudo systemctl start ssh
        sudo systemctl enable ssh
        ffmpeg -version | head -n 1
        ffprobe -version | head -n 1
        aria2c -version | head -n 1

        wget -O bclone.zip https://github.com/BenjiThatFoxGuy/bclone/releases/download/v1.73.1/rclone-v1.73.1-linux-amd64.zip
        unzip -o bclone.zip
        sudo install -m 755 rclone-v1.73.1-linux-amd64/rclone /usr/local/bin/rclone
        rclone version

        python -m pip install --upgrade pip
        pip install pyrogram tgcrypto

    - name: Setup Variable Environments
      run: |
        if [ -z "$DOWNLOAD_DIR" ]; then
          echo "DOWNLOAD_DIR=/home/runner/downloads" >> "$GITHUB_ENV"
        fi
        if [ -z "$PROGRESS_INTERVAL" ]; then
          echo "PROGRESS_INTERVAL=5" >> "$GITHUB_ENV"
        fi

        mkdir -p /home/runner/.config/rclone
        echo "$RCLONE_CONF" > /home/runner/.config/rclone/rclone.conf
        sudo chown -R runner:runner /home/runner/.config

    - name: Setup Filedrop
      run: |
        mkdir -p ~/downloads
        mkdir -p ~/uploads
        mkdir -p ~/scripts
        printf "%s%n\n" "$FILEDROP" > ~/scripts/filedrop.sh
        sed -i "s/\r$//" ~/scripts/filedrop.sh
        chmod +x ~/scripts/filedrop.sh

    - name: Start Pyrogram Downloader
      run: |
        set -euo pipefail
        mkdir -p "${DOWNLOAD_DIR:-/home/runner/downloads}"

        PYRO_SCRIPT=""
        if [ -f "scripts/pyro.py" ]; then
          PYRO_SCRIPT="scripts/pyro.py"
        elif [ -f "pyro.py" ]; then
          PYRO_SCRIPT="pyro.py"
        else
          echo "File pyro.py tidak ditemukan (cek scripts/pyro.py atau pyro.py)."
          echo "Isi repo saat ini:"
          find . -maxdepth 3 -type f | sort
          exit 1
        fi

        echo "Menjalankan: $PYRO_SCRIPT"
        nohup python -u "$PYRO_SCRIPT" > /home/runner/pyro.log 2>&1 &
        echo $! > /home/runner/pyro.pid
        sleep 3
        if ! ps -p "$(cat /home/runner/pyro.pid)" > /dev/null 2>&1; then
          echo "Pyrogram process gagal start. Isi /home/runner/pyro.log:"
          tail -n 200 /home/runner/pyro.log || true
          exit 1
        fi
        ps -p "$(cat /home/runner/pyro.pid)"

    - name: Set User Password
      run: |
        if [ -z "$SSH_PASSWORD" ]; then
          echo "SSH_PASSWORD belum di-set."
          exit 1
        fi
        echo "runner:$SSH_PASSWORD" | sudo chpasswd

    - name: Start ngrok and display URL
      run: |
        if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
          echo "TELEGRAM_BOT_TOKEN atau TELEGRAM_CHAT_ID belum di-set."
          exit 1
        fi

        ./ngrok tcp 22 > /dev/null &
        sleep 10

        NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        NGROK_HOST=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f1)
        NGROK_PORT=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f2)

        echo "::add-mask::$TELEGRAM_BOT_TOKEN"
        echo "::add-mask::$TELEGRAM_CHAT_ID"
        echo "::add-mask::$NGROK_HOST"
        echo "::add-mask::$NGROK_PORT"
        echo "::add-mask::$SSH_PASSWORD"

        SSH_MESSAGE=$(cat <<EOF
        SSH Connection Info
        Host: $NGROK_HOST
        Port: $NGROK_PORT
        Username: runner
        Password: $SSH_PASSWORD

        Command:
        ssh runner@$NGROK_HOST -p $NGROK_PORT
        EOF
        )
        ENCODED_CHAT_ID=$(printf '%s' "$TELEGRAM_CHAT_ID" | jq -sRr @uri)
        ENCODED_TEXT=$(printf '%s' "$SSH_MESSAGE" | jq -sRr @uri)
        curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${ENCODED_CHAT_ID}&text=${ENCODED_TEXT}&disable_web_page_preview=true" > /dev/null

        echo "Info SSH sudah dikirim ke Telegram."

        sleep 6h

    - name: Stop Downloader
      if: always()
      run: |
        if [ -f /home/runner/pyro.pid ]; then
          kill "$(cat /home/runner/pyro.pid)" || true
        fi
        tail -n 200 /home/runner/pyro.log || true

    - name: Upload Downloads via rclone
      if: always()
      run: |
        if [ -z "$RCLONE_REMOTE_PATH" ]; then
          echo "RCLONE_REMOTE_PATH belum di-set, upload dilewati."
          exit 0
        fi

        TARGET_DIR="${DOWNLOAD_DIR:-/home/runner/downloads}"
        if [ ! -d "$TARGET_DIR" ]; then
          echo "Directory download tidak ditemukan: $TARGET_DIR"
          exit 0
        fi

        rclone copy "$TARGET_DIR" "$RCLONE_REMOTE_PATH" --progress --transfers 4 --checkers 8
