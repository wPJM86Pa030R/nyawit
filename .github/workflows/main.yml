name: YXN

on:
  push:
  workflow_dispatch:
    inputs:
      filedrop_file:
        description: "Path file di repo yang akan di-upload"
        required: false
        default: ""
      filedrop_path:
        description: "Path tujuan di FileDrop (opsional)"
        required: false
        default: ""
      filedrop_action:
        description: "Aksi jika file sudah ada: skip|keep|replace"
        required: false
        default: "skip"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download ngrok
      run: |
        wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xvzf ngrok-v3-stable-linux-amd64.tgz
        chmod +x ngrok
    
    - name: Auth ngrok
      run: ./ngrok authtoken ${{ secrets.NGROK_AUTHTOKEN }}
    
    - name: Setup SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server jq
        sudo systemctl start ssh
        sudo systemctl enable ssh
    
    - name: Set User Password
      run: |
        echo "runner:P@ssw0rd!" | sudo chpasswd

    - name: Upload file via MediaFire FileDrop (optional)
      if: ${{ github.event.inputs.filedrop_file }}
      env:
        FILEDROP_FILE: ${{ github.event.inputs.filedrop_file }}
        FILEDROP_PATH: ${{ github.event.inputs.filedrop_path }}
        FILEDROP_ACTION: ${{ github.event.inputs.filedrop_action }}
        MEDIAFIRE_FILEDROP_KEY: ${{ secrets.MEDIAFIRE_FILEDROP_KEY }}
      run: |
        set -euo pipefail

        if [ -z "${MEDIAFIRE_FILEDROP_KEY}" ]; then
          echo "Secret MEDIAFIRE_FILEDROP_KEY belum diisi."
          exit 1
        fi

        if [ ! -f "${FILEDROP_FILE}" ]; then
          echo "File tidak ditemukan: ${FILEDROP_FILE}"
          exit 1
        fi

        cmd=(bash scripts/filedrop.sh --file "${FILEDROP_FILE}" --action "${FILEDROP_ACTION}")
        if [ -n "${FILEDROP_PATH}" ]; then
          cmd+=(--path "${FILEDROP_PATH}")
        fi

        "${cmd[@]}"

    - name: Start ngrok and display URL
      run: |
        ./ngrok tcp 22 > /dev/null &
        sleep 10
        
        NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        NGROK_HOST=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f1)
        NGROK_PORT=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f2)
        
        echo "=========================================="
        echo "SSH Connection Info:"
        echo "Host: $NGROK_HOST"
        echo "Port: $NGROK_PORT"
        echo "Username: runner"
        echo "Password: P@ssw0rd!"
        echo ""
        echo "Command:"
        echo "ssh runner@$NGROK_HOST -p $NGROK_PORT"
        echo "=========================================="
        
        sleep 6h
