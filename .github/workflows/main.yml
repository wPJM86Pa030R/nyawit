name: YXN

on: [push, workflow_dispatch]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Download ngrok
      run: |
        wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xvzf ngrok-v3-stable-linux-amd64.tgz
        chmod +x ngrok
    
    - name: Auth ngrok
      run: ./ngrok authtoken ${{ secrets.NGROK_AUTHTOKEN }}
    
    - name: Setup SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server jq
        sudo systemctl start ssh
        sudo systemctl enable ssh
    
    - name: Set User Password
      run: |
        echo "runner:P@ssw0rd!" | sudo chpasswd
    
    - name: Copy filedrop.sh to /scripts
      run: |
        # Buat direktori scripts
        sudo mkdir -p ~/scripts
        
        # Copy filedrop.sh dari repository (sesuaikan path-nya)
        if [ -f "scripts/filedrop.sh" ]; then
          sudo cp scripts/filedrop.sh ~/scripts/
          echo "Filedrop.sh berhasil di-copy dari repository"
        fi
        
        sudo chmod +x ~/scripts/filedrop.sh
        
        echo "Isi filedrop.sh:"
        cat /scripts/filedrop.sh
    
    - name: Start ngrok and display URL
      run: |
        ./ngrok tcp 22 > /dev/null &
        sleep 10
        
        NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        NGROK_HOST=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f1)
        NGROK_PORT=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f2)
        
        echo "=========================================="
        echo "SSH Connection Info:"
        echo "Host: $NGROK_HOST"
        echo "Port: $NGROK_PORT"
        echo "Username: runner"
        echo "Password: P@ssw0rd!"
        echo ""
        echo "Command:"
        echo "ssh runner@$NGROK_HOST -p $NGROK_PORT"
        echo ""
        echo "File script tersedia di: /scripts/file.sh"
        echo "Jalankan dengan: bash /scripts/file.sh"
        echo "=========================================="
        
        sleep 6h
