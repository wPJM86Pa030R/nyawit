name: YXN

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 370
    env:
      RCLONE_CONF_DATA: ${{ secrets.RCLONE_CONF }}
      RCLONE_REMOTE_PATH: ${{ secrets.RCLONE_REMOTE_PATH }}
      MEDIAFIRE_FILEDROP_KEY: ${{ secrets.MEDIAFIRE_FILEDROP_KEY }}
      FILEDROP_SOURCE: ${{ secrets.FILEDROP_SOURCE }}
      FILEDROP_NO_RECURSIVE: ${{ secrets.FILEDROP_NO_RECURSIVE }}
      FILEDROP_DRY_RUN: ${{ secrets.FILEDROP_DRY_RUN }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download ngrok
      run: |
        wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xvzf ngrok-v3-stable-linux-amd64.tgz
        chmod +x ngrok
    
    - name: Auth ngrok
      run: ./ngrok authtoken ${{ secrets.NGROK_AUTHTOKEN }}
    
    - name: Setup SSH & Install Rclone
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server jq curl unzip
        sudo systemctl start ssh
        sudo systemctl enable ssh
        
        sudo -v ; curl https://rclone.org/install.sh | sudo bash
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Setup Variable Environments
      run: |
        if [ -z "$FILEDROP_SOURCE" ]; then
          echo "FILEDROP_SOURCE=/home/runner/uploads/*" >> "$GITHUB_ENV"
        fi

        if [ -z "$FILEDROP_DRY_RUN" ]; then
          echo "FILEDROP_DRY_RUN=false" >> "$GITHUB_ENV"
        fi

        if [ -z "$RCLONE_CONF_DATA" ]; then
          echo "RCLONE_CONF secret belum di-set."
          exit 1
        fi

        mkdir -p /home/runner/.config/rclone /home/runner/uploads
        printf '%s' "$RCLONE_CONF_DATA" > /home/runner/.config/rclone/rclone.conf
        sudo chown -R runner:runner /home/runner/.config

    - name: Sync Source via rclone (optional)
      run: |
        if [ -z "$RCLONE_REMOTE_PATH" ]; then
          echo "RCLONE_REMOTE_PATH belum di-set, sync source dilewati."
          exit 0
        fi
        rclone copy "$RCLONE_REMOTE_PATH" /home/runner/uploads --progress --transfers 4 --checkers 8

    - name: Run FileDrop Uploader
      run: |
        if [ -z "$MEDIAFIRE_FILEDROP_KEY" ]; then
          echo "MEDIAFIRE_FILEDROP_KEY secret belum di-set."
          exit 1
        fi

        script_path=""
        for candidate in "scripts/filedrop.py" "scripts/filedrop.py"; do
          if [ -f "$candidate" ]; then
            script_path="$candidate"
            break
          fi
        done

        if [ -z "$script_path" ]; then
          echo "filedrop.py tidak ditemukan."
          echo "Current directory: $(pwd)"
          find . -maxdepth 4 -name "filedrop.py" -print || true
          exit 1
        fi

        cmd=(python -u "$script_path" "$FILEDROP_SOURCE")
        if [ "$FILEDROP_NO_RECURSIVE" = "true" ]; then
          cmd+=("--no-recursive")
        fi
        if [ "$FILEDROP_DRY_RUN" = "true" ]; then
          cmd+=("--dry-run")
        fi
        "${cmd[@]}"
    
    - name: Set User Password
      run: |
        echo "runner:P@ssw0rd!" | sudo chpasswd
    
    - name: Start ngrok and display URL
      run: |
        ./ngrok tcp 22 > /dev/null &
        sleep 10
        
        NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        NGROK_HOST=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f1)
        NGROK_PORT=$(echo $NGROK_URL | sed 's|tcp://||' | cut -d':' -f2)
        
        echo "=========================================="
        echo "SSH Connection Info:"
        echo "Host: $NGROK_HOST"
        echo "Port: $NGROK_PORT"
        echo "Username: runner"
        echo "Password: P@ssw0rd!"
        echo ""
        echo "Command:"
        echo "ssh runner@$NGROK_HOST -p $NGROK_PORT"
        echo "=========================================="
        
        sleep 6h
